apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: {{ .Values.fullnameOverride }}
  namespace: openshift-gitops
  labels:
    rhoai-example: maas
    rhoai-example-component: bootstrap
spec:
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  destinations:
    - namespace: '*'
      server: '*'
  sourceRepos:
    - {{ .Values.repoURL }}
