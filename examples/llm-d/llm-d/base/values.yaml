fullnameOverride: gpt-oss-20b

model:
  name: openai/gpt-oss-20b
  uri: oci://registry.redhat.io/rhelai1/modelcar-gpt-oss-20b:1.5

hardwareProfile:
  name: nvidia-gpu-serving

auth:
  enabled: false
  serviceAccounts:
    - name: my-model-service

vllm:
  additionalArguments:
    - --max-seq-len=35
  resources:
    requests:
      cpu: '2'
      memory: 8Gi
      nvidia.com/gpu: '1'
    limits:
      cpu: '8'
      memory: 24Gi
      nvidia.com/gpu: '1'
